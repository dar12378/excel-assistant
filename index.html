<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Helper Excel Reading</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <section class="hero">
      <div class="hero-top">
        <div>
          <h1 id="appTitle">Helper Excel Reading</h1>
          <p id="appSubtitle">
            כתבי או אמרי מה את רוצה לעשות באקסל, העלי קובץ, וקבלי עזרה חכמה בעברית או באנגלית.
          </p>
        </div>

        <div class="lang-box">
          <label for="languageSelect" id="languageLabel">שפה</label>
          <select id="languageSelect">
            <option value="he">עברית</option>
            <option value="en">English</option>
          </select>
        </div>
      </div>
    </section>

    <section class="card">
      <div class="top-row">
        <div>
          <label class="section-label" id="promptLabel" for="userPrompt">מה תרצי לעשות באקסל?</label>
          <textarea id="userPrompt" placeholder="לדוגמה: תקן לי את הנוסחה, סכם את הקובץ, מצא שגיאות, או חשב ממוצע של סכום"></textarea>
        </div>

        <div class="field-block">
          <label class="section-label" id="defaultColumnLabel" for="defaultColumn">עמודת ברירת מחדל</label>
          <input id="defaultColumn" type="text" value="A" maxlength="50" placeholder="A או שם עמודה" />
        </div>
      </div>

      <div class="buttons">
        <button id="generateBtn" class="btn-primary" type="button">צור נוסחה</button>
        <button id="analyzeBtn" class="btn-green" type="button">נתח בקשה</button>
        <button id="reviewFileBtn" class="btn-green" type="button">בדוק את הקובץ</button>
        <button id="multiBtn" class="btn-green" type="button">כמה נוסחאות</button>
        <button id="fixFormulaBtn" class="btn-light" type="button">תקן נוסחה</button>
        <button id="uploadBtn" class="btn-light" type="button">העלאת קובץ</button>
        <button id="voiceBtn" class="btn-light" type="button">דיבור</button>
        <button id="clearBtn" class="btn-light" type="button">נקה</button>
        <button id="clearHistoryBtn" class="btn-danger" type="button">נקה היסטוריה</button>
      </div>

      <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" class="hidden">

      <div id="statusBox" class="status-line"></div>

      <section class="result">
        <div class="box">
          <div class="box-header">
            <h2 class="box-title" id="assistantAnswerTitle">תשובת האפליקציה</h2>
            <button id="copyAnswerBtn" class="btn-dark" type="button">העתק</button>
          </div>
          <div id="assistantAnswer" class="assistant-output"></div>
        </div>
      </section>

      <section id="singleResult" class="result">
        <div class="box">
          <div class="box-header">
            <h2 class="box-title" id="formulaTitle">נוסחה</h2>
            <button id="copyBtn" class="btn-dark" type="button">העתק</button>
          </div>
          <div id="formulaText" class="formula-output"></div>
        </div>

        <div class="box">
          <h2 class="box-title" id="explanationTitle">הסבר</h2>
          <p id="explanationText" class="muted"></p>
        </div>

        <div class="box">
          <h2 class="box-title" id="exampleTitle">דוגמה</h2>
          <p id="exampleText" class="muted"></p>
        </div>

        <div class="box">
          <h2 class="box-title" id="tipsTitle">טיפים</h2>
          <ul id="tipsList"></ul>
        </div>
      </section>

      <section id="multiResult" class="result hidden">
        <div class="box">
          <div class="box-header">
            <h2 class="box-title" id="multiTitle">נוסחאות אפשריות</h2>
            <button id="copyAllBtn" class="btn-dark" type="button">העתק הכל</button>
          </div>
          <div id="formulaGrid" class="multi-grid"></div>
        </div>
      </section>

      <section id="fileInsightSection" class="result hidden">
        <div class="box">
          <h2 class="box-title" id="fileInsightTitle">הבנת הקובץ</h2>
          <div id="fileInsightText" class="assistant-output"></div>
        </div>
      </section>

      <section id="fileIssuesSection" class="result hidden">
        <div class="box">
          <h2 class="box-title" id="fileIssuesTitle">שגיאות ותיקונים מומלצים</h2>
          <div id="fileIssuesText" class="assistant-output"></div>
        </div>
      </section>

      <section id="columnsSection" class="result hidden">
        <div class="box">
          <h2 class="box-title" id="columnsTitle">עמודות שזוהו בקובץ</h2>
          <div id="columnsList" class="columns-wrap"></div>
        </div>
      </section>

      <section id="previewSection" class="result hidden">
        <div class="box">
          <h2 class="box-title" id="previewTitle">תצוגה מקדימה של הקובץ</h2>
          <div class="table-wrap">
            <table id="previewTable"></table>
          </div>
        </div>
      </section>

      <section class="result">
        <div class="box">
          <h2 class="box-title" id="suggestionsTitle">הצעות מהירות</h2>
          <div id="suggestionsList" class="suggestions-grid"></div>
        </div>

        <div class="box">
          <h2 class="box-title" id="historyTitle">היסטוריה</h2>
          <div id="historyList" class="history-grid"></div>
        </div>
      </section>
    </section>
  </div>

  <script src="script.js"></script>
</body>
</html>
